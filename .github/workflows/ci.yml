name: CI — Stellar Escrow dApp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Build & Test ─────────────────────────────────────────
  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # soroban-sdk 22.0.11 MSRV is 1.84.0 (supports edition2024 deps)
      - name: Install Rust 1.84 + wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.84.0"
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-1.84-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-1.84-

      - name: Build Treasury contract (WASM)
        working-directory: contracts/treasury
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build Escrow contract (WASM)
        working-directory: contracts/escrow
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test Treasury contract
        working-directory: contracts/treasury
        run: cargo test

      - name: Test Escrow contract
        working-directory: contracts/escrow
        run: cargo test

  # ── Frontend Build & Test ───────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
