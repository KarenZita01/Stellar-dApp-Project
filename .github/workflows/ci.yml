name: CI — Stellar Escrow dApp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Build & Test ─────────────────────────────────────────
  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build Treasury contract
        working-directory: contracts/treasury
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build Escrow contract
        working-directory: contracts/escrow
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run Treasury tests
        working-directory: contracts/treasury
        run: cargo test --features testutils 2>&1 || cargo test

      - name: Run Escrow tests
        working-directory: contracts/escrow
        run: cargo test --features testutils 2>&1 || cargo test

  # ── Frontend Build & Test ───────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Build for production
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
