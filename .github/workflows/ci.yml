name: CI — Stellar Escrow dApp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Build & Test ─────────────────────────────────────────
  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Rust 1.85 satisfies edition2024 requirement of transitive deps
      # (sha2 0.11, rand_core 0.10, etc.)
      - name: Install Rust 1.85 + wasm32 target
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85.0"
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-1.85-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-1.85-

      # soroban-env-host 22.1.3 testutils has a trait conflict with
      # ed25519-dalek 3.x. Pin to 2.1.1 which is compatible.
      # cargo update generates a Cargo.lock in each crate directory.
      - name: Generate lockfile and pin ed25519-dalek for treasury
        working-directory: contracts/treasury
        run: |
          cargo generate-lockfile
          cargo update -p ed25519-dalek --precise 2.1.1
          cargo update -p ed25519 --precise 2.2.3

      - name: Generate lockfile and pin ed25519-dalek for escrow
        working-directory: contracts/escrow
        run: |
          cargo generate-lockfile
          cargo update -p ed25519-dalek --precise 2.1.1
          cargo update -p ed25519 --precise 2.2.3

      - name: Build Treasury contract (WASM)
        working-directory: contracts/treasury
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build Escrow contract (WASM)
        working-directory: contracts/escrow
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test Treasury contract
        working-directory: contracts/treasury
        run: cargo test

      - name: Test Escrow contract
        working-directory: contracts/escrow
        run: cargo test

  # ── Frontend Build & Test ───────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
