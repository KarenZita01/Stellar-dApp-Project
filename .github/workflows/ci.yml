name: CI — Stellar Escrow dApp

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Smart Contract Build & Test ─────────────────────────────────────────
  contracts:
    name: Contracts — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-stable-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-stable-

      # ed25519-dalek 3.0.0 (released 2026-07-06) introduced a breaking
      # rand_core 0.10 API change that breaks soroban-env-host 22.1.3 testutils.
      # Generate a lockfile, then downgrade 3.0.0 → 2.2.0 using the versioned
      # spec to disambiguate from the 2.2.0 entry that already exists.
      - name: Pin ed25519-dalek to 2.x for treasury
        working-directory: contracts/treasury
        run: |
          cargo generate-lockfile
          cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0

      - name: Pin ed25519-dalek to 2.x for escrow
        working-directory: contracts/escrow
        run: |
          cargo generate-lockfile
          cargo update -p ed25519-dalek@3.0.0 --precise 2.2.0

      - name: Build Treasury contract (WASM)
        working-directory: contracts/treasury
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Build Escrow contract (WASM)
        working-directory: contracts/escrow
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Test Treasury contract
        working-directory: contracts/treasury
        run: cargo test

      - name: Test Escrow contract
        working-directory: contracts/escrow
        run: cargo test

  # ── Frontend Build & Test ───────────────────────────────────────────────
  frontend:
    name: Frontend — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Run unit tests (Vitest)
        run: npm test

      - name: Production build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7
