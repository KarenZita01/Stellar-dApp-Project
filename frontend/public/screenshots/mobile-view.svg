<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Phone frame -->
  <rect width="390" height="844" fill="url(#bg)" rx="24"/>
  <!-- Navbar -->
  <rect x="0" y="0" width="390" height="60" fill="#1e293b" rx="0"/>
  <text x="20" y="38" font-family="system-ui,sans-serif" font-size="18" font-weight="800" fill="#f8fafc">🛡 StellarEscrow</text>
  <rect x="290" y="16" width="80" height="28" fill="#4f46e5" rx="6"/>
  <text x="316" y="35" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="white">Connect</text>
  <!-- Hero -->
  <text x="195" y="140" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#f8fafc" text-anchor="middle">Secure Trade.</text>
  <text x="195" y="178" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="#4f46e5" text-anchor="middle">Zero Trust.</text>
  <text x="195" y="220" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">The production-ready escrow</text>
  <text x="195" y="240" font-family="system-ui,sans-serif" font-size="13" fill="#94a3b8" text-anchor="middle">service for the Stellar ecosystem.</text>
  <!-- CTA Button -->
  <rect x="115" y="270" width="160" height="48" fill="#4f46e5" rx="24"/>
  <text x="195" y="300" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle">Get Started</text>
  <!-- Stats -->
  <rect x="20" y="360" width="100" height="70" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1"/>
  <text x="70" y="395" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#4f46e5" text-anchor="middle">1%</text>
  <text x="70" y="418" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Platform Fee</text>
  <rect x="145" y="360" width="100" height="70" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1"/>
  <text x="195" y="395" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#4f46e5" text-anchor="middle">4</text>
  <text x="195" y="418" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">States</text>
  <rect x="270" y="360" width="100" height="70" fill="#1e293b" rx="10" stroke="#334155" stroke-width="1"/>
  <text x="320" y="395" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#4f46e5" text-anchor="middle">100%</text>
  <text x="320" y="418" font-family="system-ui,sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">Trustless</text>
  <!-- Label -->
  <text x="195" y="820" font-family="system-ui,sans-serif" font-size="11" fill="#475569" text-anchor="middle">StellarEscrow · Mobile View · Testnet</text>
</svg>
